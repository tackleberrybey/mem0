name: mem0-clean

services:
  mem0:
    build:
      context: ..
      dockerfile: server/dev.Dockerfile
    ports:
      - "8888:8000"
    env_file:
      - .env
    networks:
      - mem0_network
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "rm -rf /app/packages && pip install -q --force-reinstall --no-deps mem0ai && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000"
    environment:
      - APP_DB_NAME=mem0_app
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mem0_app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=
      - DASHBOARD_URL=https://mem0-dashboard.mycoolify.top
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-false}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

  postgres:
    image: ankane/pgvector:v0.5.1
    restart: unless-stopped
    shm_size: "128mb"
    networks:
      - mem0_network
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mem0_app
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "mem0_app", "-U", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mem0_clean_postgres:/var/lib/postgresql/data
    ports:
      - "8432:5432"

  mem0-dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    networks:
      - mem0_network
    environment:
      - NEXT_PUBLIC_API_URL=https://mem0-api.mycoolify.top
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=Mem0
      - NODE_OPTIONS=--max-old-space-size=4096
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      mem0:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mem0_clean_postgres:

networks:
  mem0_network:
    driver: bridge
